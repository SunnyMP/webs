<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAS CLIENT — Descargar</title>
<meta name="description" content="Descargá BAS CLIENT, el launcher de Minecraft con modpacks, cuentas Microsoft y más.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;
  --blue:#1e6fff;
  --blue2:#5aa0ff;
  --purple:#6c3fff;
  --text:#f0f4ff;
  --muted:rgba(200,215,255,0.4);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden}

/* Fondo con ruido sutil */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Blobs */
.blob{position:fixed;border-radius:50%;filter:blur(120px);z-index:0;pointer-events:none}
.b1{width:600px;height:600px;background:rgba(30,111,255,.12);top:-200px;right:-100px}
.b2{width:400px;height:400px;background:rgba(108,63,255,.09);bottom:-100px;left:-80px}
.b3{width:300px;height:300px;background:rgba(30,111,255,.07);bottom:100px;right:200px}

/* Layout */
.wrap{
  position:relative;z-index:2;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;gap:0;
}

/* Logo */
.logo-wrap{
  width:90px;height:90px;
  background:rgba(30,111,255,.08);
  border:1px solid rgba(30,111,255,.2);
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
  position:relative;
  box-shadow:0 0 40px rgba(30,111,255,.15);
  opacity:0;animation:up .5s .0s ease forwards;
}
.logo-wrap::after{
  content:'';position:absolute;inset:-1px;
  border-radius:25px;
  background:linear-gradient(135deg,rgba(30,111,255,.3),rgba(108,63,255,.1),transparent 60%);
  z-index:-1;
}
.logo-wrap svg{width:48px;height:48px;fill:var(--blue2)}

/* Título */
.title{
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(52px,10vw,96px);
  font-weight:700;
  letter-spacing:-.02em;
  line-height:.9;
  text-align:center;
  margin-bottom:10px;
  opacity:0;animation:up .5s .08s ease forwards;
}
.title .bas{
  background:linear-gradient(135deg,#fff 10%,var(--blue2) 60%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title .client{
  background:linear-gradient(135deg,var(--blue2) 0%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-size:.55em;display:block;letter-spacing:.15em;margin-top:4px;
}

/* Badge versión */
.ver-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(30,111,255,.08);
  border:1px solid rgba(30,111,255,.18);
  border-radius:100px;
  padding:4px 14px;
  font-size:11px;color:var(--blue2);letter-spacing:.12em;
  margin-bottom:36px;
  opacity:0;animation:up .5s .16s ease forwards;
}
.ver-dot{width:5px;height:5px;border-radius:50%;background:var(--blue2);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Botón descargar */
.btn-dl{
  display:inline-flex;align-items:center;gap:12px;
  padding:15px 36px;border-radius:12px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:.05em;
  text-decoration:none;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;
  box-shadow:0 4px 32px rgba(30,111,255,.35),0 0 0 1px rgba(30,111,255,.2);
  position:relative;overflow:hidden;
  opacity:0;animation:up .5s .24s ease forwards;
  transition:transform .15s,box-shadow .2s;
}
.btn-dl::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 55%);
}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(30,111,255,.5),0 0 0 1px rgba(30,111,255,.3)}
.btn-dl:active{transform:translateY(0)}
.btn-dl svg{width:18px;height:18px;flex-shrink:0}

/* Nota */
.note{
  margin-top:12px;font-size:10.5px;color:rgba(200,215,255,.2);letter-spacing:.06em;
  opacity:0;animation:up .5s .3s ease forwards;
}

/* Links X */
.x-links{
  position:fixed;bottom:28px;
  display:flex;gap:16px;
  opacity:0;animation:up .5s .38s ease forwards;
}
.x-link{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-radius:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--muted);font-size:12px;letter-spacing:.04em;
  text-decoration:none;
  transition:all .2s;
}
.x-link:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:var(--text)}
.x-link svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}

@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="wrap">

  <div class="logo-wrap">
    <!-- Ícono de lanzador / cohete -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" opacity=".3"/>
      <path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 2.38-1.28 4.47-3.19 5.62L12 21l-.81-5.88C9.28 13.97 8 11.88 8 9.5A6.5 6.5 0 0 1 9.5 3zM12 8a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
    </svg>
  </div>

  <h1 class="title">
    <span class="bas">BAS</span>
    <span class="client">CLIENT</span>
  </h1>

  <div class="ver-badge">
    <span class="ver-dot"></span>
    <span id="ver-txt">v1.0.0 · Windows</span>
  </div>

  <a href="/api/launcher/download" class="btn-dl" id="btn-dl">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    Descargar para Windows
  </a>

  <p class="note">Windows 10 / 11 &nbsp;·&nbsp; Java 17+ recomendado</p>

</div>

<!-- Links de X -->
<div class="x-links">
  <a href="https://x.com/SunnyAim_" target="_blank" rel="noopener" class="x-link">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    @SunnyAim_
  </a>
  <a href="https://x.com/SunnyDeb_" target="_blank" rel="noopener" class="x-link">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    @SunnyDeb_
  </a>
</div>

<script>
// Stars
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d',{alpha:true});
  let W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();addEventListener('resize',resize);
  const stars=Array.from({length:60},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.1+.2,a:Math.random(),
    da:(Math.random()*.004+.001)*(Math.random()>.5?1:-1)
  }));
  const shoots=[];
  function spawnShoot(){
    shoots.push({x:Math.random()*W,y:Math.random()*H*.4,len:Math.random()*80+40,sp:Math.random()*4+2,a:1,ang:Math.PI/4+(Math.random()-.5)*.4});
    setTimeout(spawnShoot,Math.random()*16000+10000);
  }
  setTimeout(spawnShoot,4000);
  let last=0;
  function draw(ts){
    requestAnimationFrame(draw);
    if(ts-last<66)return;last=ts;
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(190,210,255,${Math.max(.03,s.a*.55)})`;ctx.fill();});
    for(let i=shoots.length-1;i>=0;i--){
      const s=shoots[i];
      const x2=s.x-Math.cos(s.ang)*s.len,y2=s.y-Math.sin(s.ang)*s.len;
      const g=ctx.createLinearGradient(s.x,s.y,x2,y2);
      g.addColorStop(0,`rgba(255,255,255,${s.a})`);g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(x2,y2);ctx.strokeStyle=g;ctx.lineWidth=1;ctx.stroke();
      s.x+=Math.cos(s.ang)*s.sp;s.y+=Math.sin(s.ang)*s.sp;
      s.a-=.022;if(s.a<=0)shoots.splice(i,1);
    }
  }
  requestAnimationFrame(draw);
})();

// Cargar versión y estado del launcher desde la API
async function loadLauncherInfo(){
  try{
    const r=await fetch('/api/launcher');
    const d=await r.json();
    if(d.version) document.getElementById('ver-txt').textContent=`v${d.version} · Windows`;
    if(!d.available){
      const btn=document.getElementById('btn-dl');
      btn.style.opacity='.5';btn.style.cursor='not-allowed';
      btn.onclick=e=>e.preventDefault();
      btn.innerHTML=btn.innerHTML.replace('Descargar para Windows','Próximamente');
    }
  }catch{}
}
loadLauncherInfo();
</script>
</body>
</html>
