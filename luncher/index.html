<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAS CLIENT</title>
<meta name="description" content="Launcher de Minecraft — BAS CLIENT">
<link rel="icon" href="./favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04060f;--bg2:#080c1a;--blue:#1e6fff;--blue2:#4f9fff;--text:#f0f4ff;--muted:rgba(200,212,255,0.45);--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);overflow:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.blob{position:fixed;border-radius:50%;filter:blur(120px);opacity:.10;z-index:0;pointer-events:none}
.b1{width:600px;height:600px;background:#1a5fff;top:-200px;right:-100px}
.b2{width:450px;height:450px;background:#3010ff;bottom:-100px;left:-100px}
.wrap{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(30,111,255,.10);border:1px solid rgba(30,111,255,.22);border-radius:100px;padding:5px 14px;font-size:11px;font-family:var(--font-m);color:var(--blue2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px;animation:up .7s ease both}
.badge::before{content:'';width:6px;height:6px;background:var(--blue);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--blue)}50%{box-shadow:0 0 14px var(--blue)}}
h1{font-family:var(--font-d);font-size:clamp(64px,12vw,130px);font-weight:800;line-height:.9;letter-spacing:-.04em;animation:up .7s .1s ease both}
h1 span{background:linear-gradient(135deg,#fff 20%,var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:15px;color:var(--muted);margin-top:20px;margin-bottom:40px;line-height:1.6;animation:up .7s .2s ease both}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:10px;font-family:var(--font-d);font-weight:700;font-size:15px;text-decoration:none;border:none;cursor:pointer;transition:transform .15s,box-shadow .2s;animation:up .7s .3s ease both;position:relative;overflow:hidden}
.btn-dl{background:var(--blue);color:#fff;box-shadow:0 4px 28px rgba(30,111,255,.35)}
.btn-dl::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 60%)}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(30,111,255,.5)}
.btn-dl.disabled{background:rgba(30,111,255,.22);box-shadow:none;cursor:not-allowed}
.btn-dl.disabled:hover{transform:none}
.note{margin-top:16px;font-size:11px;font-family:var(--font-m);color:rgba(200,212,255,.2);animation:up .7s .4s ease both}
.soon{display:inline-block;background:rgba(255,160,50,.10);border:1px solid rgba(255,160,50,.25);color:#ffb347;font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:16px;animation:up .7s .05s ease both}
.admin-link{position:fixed;bottom:24px;right:28px;font-size:11px;font-family:var(--font-m);color:rgba(200,212,255,.18);text-decoration:none;letter-spacing:.05em;transition:color .2s;z-index:10}
.admin-link:hover{color:var(--muted)}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="wrap">
  <div class="soon">Próximamente</div>
  <div class="badge">v1.0.0</div>
  <h1><span>BAS</span><br>CLIENT</h1>
  <p class="sub">Launcher de Minecraft.<br>Modpacks, cuentas Microsoft y más.</p>
  <a href="#" class="btn btn-dl disabled" onclick="return false;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    Descargar para Windows
  </a>
  <p class="note">Windows 10 / 11 · Java 17+ requerido</p>
</div>
<a href="/admin" class="admin-link">admin →</a>
<script>
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let W,H,stars=[],shoots=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();addEventListener('resize',resize);
  for(let i=0;i<220;i++) stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.2,a:Math.random(),da:(Math.random()*.012+.003)*(Math.random()>.5?1:-1),vx:(Math.random()-.5)*.04,vy:(Math.random()-.5)*.04});
  function spawnShoot(){shoots.push({x:Math.random()*W,y:Math.random()*H*.4,len:Math.random()*120+50,sp:Math.random()*7+4,a:1,ang:Math.PI/4+(Math.random()-.5)*.35});setTimeout(spawnShoot,Math.random()*6000+4000)}
  setTimeout(spawnShoot,2000);
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;s.x+=s.vx;s.y+=s.vy;if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,200,255,${Math.max(.04,s.a*.6)})`;ctx.fill()});
    for(let i=shoots.length-1;i>=0;i--){const s=shoots[i];const x2=s.x-Math.cos(s.ang)*s.len,y2=s.y-Math.sin(s.ang)*s.len;const g=ctx.createLinearGradient(s.x,s.y,x2,y2);g.addColorStop(0,`rgba(255,255,255,${s.a})`);g.addColorStop(1,'rgba(255,255,255,0)');ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(x2,y2);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();s.x+=Math.cos(s.ang)*s.sp;s.y+=Math.sin(s.ang)*s.sp;s.a-=.02;if(s.a<=0)shoots.splice(i,1)}
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
