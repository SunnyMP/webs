<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BAS CLIENT</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050e;--blue:#1e78ff;--blue2:#4f9fff;--purple:#6c3fff;
  --text:#e8eeff;--muted:rgba(232,238,255,0.45);--border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(30,120,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,120,255,0.04) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
}

/* CENTER CARD */
.card{
  position:relative;z-index:1;
  text-align:center;
  padding:64px 56px;
  background:rgba(8,8,22,0.85);
  border:1px solid rgba(30,120,255,0.2);
  border-radius:28px;
  box-shadow:0 0 100px rgba(30,120,255,0.12),0 40px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);
  max-width:480px;width:90vw;
  animation:rise .9s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.glow-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:500px;height:500px;
  background:radial-gradient(ellipse,rgba(30,120,255,0.1),transparent 65%);
  pointer-events:none;z-index:0;
}

.logo{
  width:80px;margin:0 auto 22px;
  filter:drop-shadow(0 0 24px rgba(30,120,255,0.7));
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

h1{
  font-family:'Orbitron',monospace;
  font-size:38px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(160deg,#fff 0%,#c8d8ff 40%,var(--blue2) 75%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.sub{
  font-family:'Orbitron',monospace;
  font-size:11px;letter-spacing:5px;color:var(--muted);
  margin-bottom:32px;
}

/* VERSION BADGE */
.ver-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 14px;
  background:rgba(30,120,255,0.08);
  border:1px solid rgba(30,120,255,0.25);
  border-radius:100px;
  font-size:11px;font-weight:600;color:var(--blue2);
  margin-bottom:32px;
}
.ver-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 6px var(--blue);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* DOWNLOAD BUTTONS */
.dl-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}

.btn-win{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 24px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border:none;border-radius:12px;
  color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;text-decoration:none;
  box-shadow:0 0 30px rgba(30,120,255,0.3),0 4px 16px rgba(0,0,0,0.4);
  transition:all .25s;position:relative;overflow:hidden;
}
.btn-win::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
  opacity:0;transition:opacity .2s;
}
.btn-win:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(30,120,255,0.45),0 8px 24px rgba(0,0,0,0.4)}
.btn-win:hover::after{opacity:1}

.btn-linux{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:12px 24px;
  background:transparent;
  border:1px solid var(--border);border-radius:12px;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;text-decoration:none;
  transition:all .25s;
}
.btn-linux:hover{border-color:rgba(30,120,255,0.4);color:var(--text);background:rgba(30,120,255,0.05)}

.note{font-size:11px;color:rgba(255,255,255,0.2)}

/* FOOTER LINK */
.admin-link{
  position:fixed;bottom:20px;right:24px;z-index:10;
  font-size:11px;color:rgba(255,255,255,0.15);
  text-decoration:none;transition:color .2s;
  font-family:'DM Sans',sans-serif;
}
.admin-link:hover{color:rgba(255,255,255,0.4)}

@media(max-width:480px){
  .card{padding:44px 28px}
  h1{font-size:30px}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>

<div class="card">
  <div class="glow-ring"></div>
  <img src="/basicon_nobg.png" onerror="this.src='/basicon.png'" class="logo" alt="BAS CLIENT">
  <h1>BAS CLIENT</h1>
  <p class="sub">MINECRAFT LAUNCHER</p>

  <div class="ver-badge">
    <span class="ver-dot"></span>
    v1.0.0 · Disponible ahora
  </div>

  <div class="dl-btns">
    <a href="#" class="btn-win" id="dl-win">
      <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path d="M3 12V6.75l6-1.32v6.57H3zm17 0h-7V5.18l7-1.55V12zM3 13h6v6.57l-6-1.32V13zm17 0v7.37l-7-1.55V13h7z"/></svg>
      Descargar para Windows
    </a>
    <a href="#" class="btn-linux" id="dl-linux">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.5 12c0 1.7-.7 3.2-1.8 4.3L17 18H7l1.3-1.7C7.2 15.2 6.5 13.7 6.5 12c0-3 2.2-5.5 5-5.5s5 2.5 5 5.5zm-5-7.5C8.4 4.5 5 8 5 12c0 2 .8 3.8 2 5.1L5 20h14l-2-2.9C18.2 15.8 19 14 19 12c0-4-3.4-7.5-6.5-7.5z"/></svg>
      Descargar para Linux (.AppImage)
    </a>
  </div>

  <p class="note">Requiere Java 17+ · No asociado con Mojang / Microsoft</p>
</div>

<a href="/admin.html" class="admin-link">admin</a>

<script>
const cv = document.getElementById('bg-canvas');
const cx = cv.getContext('2d');
function rs(){ cv.width = innerWidth; cv.height = innerHeight; }
rs(); addEventListener('resize', rs);
const stars = Array.from({length:180}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: Math.random()*1.4+.2, a: Math.random(),
  da: (Math.random()*.008+.002)*(Math.random()>.5?1:-1)
}));
(function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s => {
    s.a += s.da;
    if(s.a>1||s.a<0) s.da*=-1;
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${Math.max(.03,s.a)})`; cx.fill();
  });
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
