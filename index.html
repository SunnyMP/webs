<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SunnyDeb — Wiki</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07080f;
      --bg2: #0d0e1a;
      --bg3: #131525;
      --line: rgba(255,255,255,0.07);
      --text: #eef0ff;
      --muted: #4a4f72;
      --qh: #00e5a0;
      --af: #5ba8ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* NAV */
    nav {
      position: relative; z-index: 10;
      padding: 0 36px; height: 58px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(7,8,15,0.85);
      backdrop-filter: blur(20px);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 14px; color: var(--text);
    }
    .nav-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--qh);
      box-shadow: 0 0 10px var(--qh), 0 0 20px var(--qh);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-size: 12px; font-weight: 500;
      color: var(--muted); text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid transparent;
      font-family: 'JetBrains Mono', monospace;
      transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .nav-link svg { width: 13px; height: 13px; fill: currentColor; }
    .nav-link:hover { color: var(--text); background: var(--bg3); border-color: var(--line); }

    /* LANG switcher */
    .lang-switch {
      display: flex; align-items: center; gap: 3px;
      background: var(--bg3); border: 1px solid var(--line);
      border-radius: 8px; padding: 3px;
    }
    .lang-btn {
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 6px;
      border: none; background: none;
      color: var(--muted); cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .lang-btn.active {
      background: var(--bg2); color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .lang-btn:hover:not(.active) { color: var(--text); }

    /* MAIN */
    main {
      position: relative; z-index: 1;
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 28px 80px; gap: 48px;
    }

    .hero {
      text-align: center;
      animation: fadeUp .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 900; letter-spacing: -.03em;
      line-height: 1.05;
    }
    .hero h1 .g { color: var(--qh); }

    /* CARDS */
    .cards {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .7s .1s cubic-bezier(.16,1,.3,1) both;
    }

    .card {
      position: relative; width: 190px;
      border-radius: 20px; border: 1px solid var(--line);
      background: rgba(13,14,26,0.75);
      backdrop-filter: blur(12px);
      text-decoration: none; color: inherit;
      overflow: hidden;
      transition: transform .25s, border-color .25s, box-shadow .25s;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      border-radius: inherit; background: var(--cglow); opacity: 0;
      transition: opacity .3s;
    }
    .card:hover { transform: translateY(-6px); }
    .card:hover::before { opacity: 1; }
    .card-qh { --cglow: linear-gradient(135deg,rgba(0,229,160,.09),transparent); }
    .card-af { --cglow: linear-gradient(135deg,rgba(91,168,255,.09),transparent); }
    .card-qh:hover { border-color: rgba(0,229,160,.4); box-shadow: 0 20px 50px rgba(0,0,0,.6),0 0 28px rgba(0,229,160,.12); }
    .card-af:hover { border-color: rgba(91,168,255,.4); box-shadow: 0 20px 50px rgba(0,0,0,.6),0 0 28px rgba(91,168,255,.12); }

    .card-img {
      width: 100%; aspect-ratio: 1; background: #000;
      display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s; }
    .card:hover .card-img img { transform: scale(1.06); }
    .card-img::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg,transparent 30%,rgba(255,255,255,.05) 50%,transparent 70%);
      transform: translateX(-100%); transition: transform .5s;
    }
    .card:hover .card-img::after { transform: translateX(100%); }

    .card-foot {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,.25);
    }
    .card-name { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
    .card-ver {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px; border: 1px solid;
    }
    .card-qh .card-ver { color: var(--qh); border-color: rgba(0,229,160,.3); background: rgba(0,229,160,.06); }
    .card-af .card-ver { color: var(--af); border-color: rgba(91,168,255,.3); background: rgba(91,168,255,.06); }

    /* FOOTER */
    footer {
      position: relative; z-index: 1;
      padding: 16px 36px;
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(7,8,15,0.7);
    }
    .footer-links { display: flex; gap: 6px; }
    .footer-link {
      display: flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      text-decoration: none;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid transparent;
      transition: all .2s;
    }
    .footer-link svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
    .footer-link:hover { color: var(--text); background: var(--bg3); border-color: var(--line); }
    .footer-right {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
    }

    @media (max-width: 480px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      main { padding: 50px 20px 60px; gap: 36px; }
      footer { padding: 14px 20px; flex-direction: column; gap: 10px; }
    }
  </style>
</head>

<script>
// STARS
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars(n=220) {
  stars = [];
  for(let i=0;i<n;i++) stars.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.4+.2,
    vx: (Math.random()-.5)*.12, vy: (Math.random()-.5)*.12,
    a: Math.random(), da: (Math.random()-.5)*.004,
    color: Math.random()>.85 ? `rgba(0,229,160,${Math.random()*.7+.2})` : Math.random()>.7 ? `rgba(91,168,255,${Math.random()*.7+.2})` : `rgba(200,210,255,${Math.random()*.6+.1})`
  });
}
function draw() {
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    s.x+=s.vx; s.y+=s.vy; s.a+=s.da;
    if(s.a<=0||s.a>=1) s.da*=-1;
    if(s.x<0) s.x=W; if(s.x>W) s.x=0;
    if(s.y<0) s.y=H; if(s.y>H) s.y=0;
    ctx.save();
    ctx.globalAlpha=Math.max(0,Math.min(1,s.a));
    ctx.fillStyle=s.color;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    if(s.r>1.1){ctx.globalAlpha*=.3;ctx.beginPath();ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  requestAnimationFrame(draw);
}
document.addEventListener('mousemove',e=>{
  const dx=(e.clientX/W-.5)*.3, dy=(e.clientY/H-.5)*.3;
  stars.forEach(s=>{
    s.vx+=dx*.0004; s.vy+=dy*.0004;
    const sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy);
    if(sp>.3){s.vx*=.3/sp;s.vy*=.3/sp;}
  });
});
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});

// LANG
function setLang(lang) {
  document.body.classList.remove('es','en');
  document.body.classList.add(lang);
  document.getElementById('btn-es').classList.toggle('active', lang==='es');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  localStorage.setItem('wiki-lang', lang);
}
(function(){ setLang(localStorage.getItem('wiki-lang')||'es'); })();
</script>
