<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SunnyDev — Wiki</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07080f;
      --bg2: #0d0e1a;
      --bg3: #131525;
      --line: rgba(255,255,255,0.07);
      --text: #eef0ff;
      --muted: #4a4f72;
      --qh: #00e5a0;
      --qh-dim: rgba(0,229,160,0.1);
      --af: #5ba8ff;
      --af-dim: rgba(91,168,255,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── STAR CANVAS ── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: relative; z-index: 10;
      padding: 0 36px;
      height: 58px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7,8,15,0.8);
      backdrop-filter: blur(20px);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 14px; color: var(--text);
    }
    .nav-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--qh);
      box-shadow: 0 0 10px var(--qh), 0 0 20px var(--qh);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-size: 12px; font-weight: 500;
      color: var(--muted); text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid transparent;
      font-family: 'JetBrains Mono', monospace;
      transition: all .2s;
    }
    .nav-link:hover { color: var(--text); background: var(--bg3); border-color: var(--line); }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 28px 80px;
      gap: 56px;
    }

    /* ── HERO TEXT ── */
    .hero {
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      animation: fadeUp .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .hero-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .hero-tag::before, .hero-tag::after {
      content: ''; width: 24px; height: 1px; background: var(--line);
    }

    .hero-title {
      font-size: clamp(34px, 5.5vw, 58px);
      font-weight: 900;
      letter-spacing: -.03em;
      line-height: 1.05;
    }
    .hero-title .g { color: var(--qh); }

    .hero-sub {
      font-size: 14px; color: var(--muted);
      max-width: 340px; line-height: 1.6;
    }

    /* ── CARDS ── */
    .cards {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .7s .1s cubic-bezier(.16,1,.3,1) both;
    }

    .card {
      position: relative;
      width: 200px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(13,14,26,0.7);
      backdrop-filter: blur(12px);
      text-decoration: none; color: inherit;
      overflow: hidden;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      cursor: pointer;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: var(--card-glow);
      opacity: 0;
      transition: opacity .3s;
    }
    .card:hover { transform: translateY(-6px); }
    .card:hover::before { opacity: 1; }
    .card-qh { --card-glow: linear-gradient(135deg, rgba(0,229,160,.08), transparent); }
    .card-af { --card-glow: linear-gradient(135deg, rgba(91,168,255,.08), transparent); }
    .card-qh:hover { border-color: rgba(0,229,160,.4); box-shadow: 0 20px 50px rgba(0,0,0,.6), 0 0 30px rgba(0,229,160,.1); }
    .card-af:hover { border-color: rgba(91,168,255,.4); box-shadow: 0 20px 50px rgba(0,0,0,.6), 0 0 30px rgba(91,168,255,.1); }

    /* icon area */
    .card-img {
      width: 100%; aspect-ratio: 1;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .35s;
    }
    .card:hover .card-img img { transform: scale(1.06); }

    /* shimmer on hover */
    .card-img::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.06) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .card:hover .card-img::after { transform: translateX(100%); }

    /* footer row */
    .card-foot {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,.2);
    }
    .card-name {
      font-size: 13px; font-weight: 700; letter-spacing: -.01em;
    }
    .card-ver {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px; border: 1px solid;
    }
    .card-qh .card-ver { color: var(--qh); border-color: rgba(0,229,160,.3); background: rgba(0,229,160,.06); }
    .card-af .card-ver { color: var(--af); border-color: rgba(91,168,255,.3); background: rgba(91,168,255,.06); }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      padding: 18px 36px;
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(7,8,15,0.6);
    }
    footer span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
    }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      text-decoration: none; transition: color .15s;
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 480px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      main { padding: 50px 20px 60px; gap: 40px; }
      footer { padding: 16px 20px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>

<script>
// ── STARFIELD ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [], mouse = {x: 0, y: 0};

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars(n = 220) {
  stars = [];
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.2,
      vx: (Math.random() - .5) * 0.12,
      vy: (Math.random() - .5) * 0.12,
      a: Math.random(),
      da: (Math.random() - .5) * 0.004,
      color: Math.random() > .85
        ? `rgba(0,229,160,${Math.random()*.7+.2})`
        : Math.random() > .7
          ? `rgba(91,168,255,${Math.random()*.7+.2})`
          : `rgba(200,210,255,${Math.random()*.6+.1})`
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.a += s.da;
    if (s.a <= 0 || s.a >= 1) s.da *= -1;
    if (s.x < 0) s.x = W;
    if (s.x > W) s.x = 0;
    if (s.y < 0) s.y = H;
    if (s.y > H) s.y = 0;

    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, s.a));
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    // subtle glow on bigger stars
    if (s.r > 1.1) {
      ctx.globalAlpha *= .3;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
  requestAnimationFrame(draw);
}

// subtle parallax on mouse
document.addEventListener('mousemove', e => {
  const dx = (e.clientX / W - .5) * 0.3;
  const dy = (e.clientY / H - .5) * 0.3;
  stars.forEach(s => {
    s.vx += dx * 0.0004;
    s.vy += dy * 0.0004;
    const speed = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
    if (speed > 0.3) { s.vx *= 0.3/speed; s.vy *= 0.3/speed; }
  });
});

resize();
initStars();
draw();
window.addEventListener('resize', () => { resize(); initStars(); });
</script>
